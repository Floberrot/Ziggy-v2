# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.vpn.yml — VPN-only production stack
#
# Difference from docker-compose.prod.yml:
#   - app ports are bound to 10.8.0.1 (WireGuard interface) ONLY
#   - Port 443 is not exposed (no TLS — WireGuard encrypts the tunnel)
#   - Caddyfile.vpn is used (HTTP on VPN IP, no Let's Encrypt)
#   - The app is completely unreachable from the public internet
#
# Deploy:
#   docker compose -f docker-compose.vpn.yml --env-file .env.prod up -d
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Application (FrankenPHP — VPN interface only) ──────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      # Bind Caddy to the WireGuard IP only
      SERVER_NAME: "http://10.8.0.1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      JWT_SECRET_KEY: /run/secrets/jwt_private
      JWT_PUBLIC_KEY: /run/secrets/jwt_public
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      # Accept requests from the VPN subnet
      CORS_ALLOW_ORIGIN: '^http://10\.8\.0\.1$'
      FRONTEND_BASE_URL: http://10.8.0.1
      DEFAULT_URI: http://10.8.0.1
    ports:
      # Bind ONLY to WireGuard interface — invisible from public internet
      - "10.8.0.1:80:80"
    volumes:
      - caddy_logs:/var/log/caddy
    secrets:
      - jwt_private
      - jwt_public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ziggy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://10.8.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Messenger worker ───────────────────────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      php bin/console messenger:consume async
      --time-limit=3600
      --memory-limit=256M
      -vv
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      JWT_SECRET_KEY: /run/secrets/jwt_private
      JWT_PUBLIC_KEY: /run/secrets/jwt_public
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      FRONTEND_BASE_URL: http://10.8.0.1
    secrets:
      - jwt_private
      - jwt_public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ziggy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ziggy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  ziggy:
    driver: bridge

volumes:
  postgres_data:
  caddy_logs:

secrets:
  jwt_private:
    file: ./secrets/jwt_private.pem
  jwt_public:
    file: ./secrets/jwt_public.pem
