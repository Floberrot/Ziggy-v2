name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false

# Prevent overlapping deployments for the same branch
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Quality gates ────────────────────────────────────────────────────────
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, intl, zip, opcache, apcu
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHP CodeSniffer (auto-fix check)
        run: vendor/bin/phpcs

      - name: PHPStan (level 10)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Deptrac (architecture boundaries)
        run: vendor/bin/deptrac analyse --no-progress

  # ── 2. Frontend type-check ──────────────────────────────────────────────────
  typecheck:
    name: Frontend type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: vue-tsc type check
        run: npm run type-check

  # ── 3. Build & push Docker image ────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [quality, typecheck]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ── 4. Deploy to VPS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production (Infomaniak VPS)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout (for deploy scripts)
        uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/docker-compose.prod.yml"
          target: "/opt/ziggy/"
          strip_components: 1   # copy file, not the deploy/ folder

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -euo pipefail

            # Authenticate with GHCR
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Run the deployment script
            bash /opt/ziggy/deploy.sh "${IMAGE_TAG}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for tag ${{ needs.build.outputs.image_tag }}"
          echo "Check VPS logs: ssh deploy@VPS_HOST 'docker compose -f /opt/ziggy/docker-compose.prod.yml logs --tail=50'"
