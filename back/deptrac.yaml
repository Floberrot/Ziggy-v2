deptrac:
    paths:
        - src

    layers:
        - name: Domain
          collectors:
              - type: directory
                value: 'src/(?!Shared/)[^/]+/Domain/.+'

        - name: Application
          collectors:
              - type: directory
                value: 'src/(?!Shared/)[^/]+/Application/.+'

        - name: Infrastructure
          collectors:
              - type: directory
                value: 'src/(?!Shared/)[^/]+/Infrastructure/.+'

        - name: Shared
          collectors:
              - type: directory
                value: src/Shared/.+

    ruleset:
        Domain:
            - Shared

        Application:
            - Domain
            - Shared

        Infrastructure:
            - Application
            - Domain
            - Shared

        Shared: []

    formatters:
        graphviz:
            point_to_groups: true
