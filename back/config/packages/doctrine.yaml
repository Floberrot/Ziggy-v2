doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '16'
        profiling_collect_backtrace: '%kernel.debug%'

    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        mappings:
            Identity:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Identity/Infrastructure/Output/Persistence'
                prefix: 'App\Identity\Infrastructure\Output\Persistence'
                alias: Identity
            Cat:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Cat/Infrastructure/Output/Persistence'
                prefix: 'App\Cat\Infrastructure\Output\Persistence'
                alias: Cat
            ChipType:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/ChipType/Infrastructure/Output/Persistence'
                prefix: 'App\ChipType\Infrastructure\Output\Persistence'
                alias: ChipType
            Calendar:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Calendar/Infrastructure/Output/Persistence'
                prefix: 'App\Calendar\Infrastructure\Output\Persistence'
                alias: Calendar
            Admin:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Admin/Infrastructure/Output/Persistence'
                prefix: 'App\Admin\Infrastructure\Output\Persistence'
                alias: Admin
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
