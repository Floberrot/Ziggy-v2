monolog:
    channels:
        - deprecation

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: '%kernel.logs_dir%/app.log'
                level: debug
                channels: ['!event']
            console:
                type: console
                process_psr_3_messages: false
                channels: ['!event', '!doctrine', '!console']

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                buffer_size: 50
            nested:
                type: stream
                path: '%kernel.logs_dir%/app.log'
                level: debug
            console:
                type: console
                process_psr_3_messages: false
                channels: ['!event', '!doctrine', '!console']
            deprecation:
                type: stream
                channels: [deprecation]
                path: '%kernel.logs_dir%/deprecation.log'

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
            nested:
                type: stream
                path: '%kernel.logs_dir%/test.log'
                level: debug
