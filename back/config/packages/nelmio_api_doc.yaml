nelmio_api_doc:
    documentation:
        info:
            title: Ziggy API
            description: |
                Private REST API for the Ziggy cat calendar application.

                ## Authentication
                All endpoints except `POST /api/auth/register` and `POST /api/auth/login` require a **Bearer JWT token**.

                Obtain a token via `POST /api/auth/login`, then pass it as:
                ```
                Authorization: Bearer <token>
                ```
            version: '1.0.0'
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []

    areas:
        path_patterns:
            - ^/api
