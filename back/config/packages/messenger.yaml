framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2

            failed:
                dsn: 'doctrine://default?queue_name=failed'

            sync: 'sync://'

        default_bus: command.bus

        buses:
            command.bus:
                middleware:
                    - doctrine_transaction

            query.bus: ~

            event.bus:
                default_middleware:
                    enabled: true
                    allow_no_handlers: true

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
